name: Build Native Image

on: push
env:
  GRADLE_USER_HOME: .gradle

jobs:
  nativeImage:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, macos-26-intel, windows-latest, windows-11-arm]
    steps:
      - uses: actions/checkout@v4
      - uses: graalvm/setup-graalvm@v1.5.6
        with:
          java-version: '25'      # See 'Options' for more details
          distribution: 'graalvm-community' # See 'Supported distributions' for available options
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 #v6.2.0
        with:
          gradle-version: "9.5.1"
      - name: Build with Gradle
        run: gradle nativeCompileCI
      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          path: |
            build/native/native*Compile

  package:
    runs-on: ubuntu-latest
    needs:
      - nativeImage
    steps:
      - name: Download all Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c #v8.0.1
      - name: Pack
        run: |
          mkdir -p out/linux/arm64
          mkdir -p out/linux/x64
          mkdir -p out/macos/arm64
          mkdir -p out/macos/x64
          mkdir -p out/windows/arm64
          mkdir -p out/windows/x64
          cp build/native/nativeWindowsX64Compile/Launcher.exe out/windows/x64/PokeMMO-Updater.exe
          cp build/native/nativeWindowsARM64Compile/Launcher.exe out/windows/arm64/PokeMMO-Updater.exe
          cp build/native/nativeMacosX64Compile/Launcher out/macos/x64/PokeMMO-Updater
          cp build/native/nativeMacosARM64Compile/Launcher out/macos/arm64/PokeMMO-Updater
          cp build/native/nativeLinuxX64Compile/Launcher out/linux/x64/PokeMMO-Updater
          cp build/native/nativeLinuxARM64Compile/Launcher out/linux/arm64/PokeMMO-Updater
      - name: Upload Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: native-image
          path: out